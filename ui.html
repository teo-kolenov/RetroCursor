<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), clipboard-write=(), display-capture=()">
  <style>
    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      padding: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      overflow: hidden;
      box-sizing: border-box;
      color: #222;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 6px;
      box-sizing: border-box;
    }

    .control-group {
      display: flex;
      flex-direction: column;
    }

    .compact-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    label {
      font-size: 12px;
      font-weight: 600;
      line-height: 14px;
      color: #333;
    }

    select {
      min-width: 112px;
      padding: 6px 24px 6px 8px;
      border: 1px solid #cfcfcf;
      border-radius: 4px;
      background: white;
      font-size: 12px;
      line-height: 16px;
    }

    select:focus,
    button:focus-visible {
      outline: 2px solid #0a84ff;
      outline-offset: 2px;
    }

    .cursor-grid {
      --grid-cell-size: 64px;
      --grid-column-count: 4;
      --visible-row-count: 1;
      display: grid;
      grid-template-columns: repeat(var(--grid-column-count), var(--grid-cell-size));
      grid-auto-rows: var(--grid-cell-size);
      align-content: start;
      width: calc(var(--grid-cell-size) * var(--grid-column-count));
      height: calc(var(--grid-cell-size) * var(--visible-row-count));
      max-height: calc(var(--grid-cell-size) * 8);
      overflow-y: auto;
      overflow-x: hidden;
      border: 1px solid #cfcfcf;
      border-radius: 6px;
      background: #ffffff;
      box-sizing: border-box;
    }

    .cursor-cell {
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--grid-cell-size);
      height: var(--grid-cell-size);
      margin: 0;
      padding: 0;
      border: 0;
      border-right: 1px solid #eeeeee;
      border-bottom: 1px solid #eeeeee;
      border-radius: 0;
      background:
        linear-gradient(45deg, #f7f7f7 25%, transparent 25%),
        linear-gradient(-45deg, #f7f7f7 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #f7f7f7 75%),
        linear-gradient(-45deg, transparent 75%, #f7f7f7 75%);
      background-color: #ffffff;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
      background-size: 16px 16px;
      cursor: pointer;
      box-sizing: border-box;
    }

    .cursor-cell:hover {
      background-color: #eef6ff;
    }

    .cursor-cell.is-selected {
      box-shadow: inset 0 0 0 2px #0a84ff;
      background-color: #e5f1ff;
    }

    .cursor-cell img {
      display: block;
      width: 40px;
      height: 40px;
      margin: auto;
      object-fit: contain;
      image-rendering: pixelated;
      pointer-events: none;
    }

    .status {
      display: flex;
      align-items: center;
      height: 100%;
      min-height: 64px;
      padding: 0 12px;
      grid-column: 1 / -1;
      color: #666;
      font-size: 12px;
      box-sizing: border-box;
    }

    button {
      height: 32px;
      padding: 0 12px;
      border: 0;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

  </style>
</head>
<body>
  <div class="controls">
    <div class="control-group">
      <div id="cursorGrid" class="cursor-grid" role="grid" aria-label="Cursor picker">
        <div class="status">Loading cursor images...</div>
      </div>
    </div>

    <div class="compact-row">
      <label for="cursorSize">Size</label>
      <select id="cursorSize">
        <option value="24 px">24 px</option>
        <option value="32 px">32 px</option>
        <option value="48 px">48 px</option>
        <option value="64 px" selected>64 px</option>
        <option value="128 px">128 px</option>
        <option value="256 px">256 px</option>
      </select>
    </div>
  </div>

  <script>
    const cursorGrid = document.getElementById('cursorGrid');
    const cursorSizeSelect = document.getElementById('cursorSize');

    let cursorOptions = [];
    let selectedCursorType = 'MacOS 9 - pointer';

    function postPluginMessage(message) {
      parent.postMessage({
        pluginMessage: message
      }, '*');
    }

    function getCurrentSettings() {
      return {
        cursorType: selectedCursorType,
        cursorSize: cursorSizeSelect.value
      };
    }

    function updateSelectedCell() {
      cursorGrid.querySelectorAll('.cursor-cell').forEach((cell) => {
        const isSelected = cell.dataset.cursorType === selectedCursorType;
        cell.classList.toggle('is-selected', isSelected);
        cell.setAttribute('aria-selected', String(isSelected));
      });
    }

    function createCursorCell(cursor) {
      const cell = document.createElement('button');
      cell.type = 'button';
      cell.className = 'cursor-cell';
      cell.dataset.cursorType = cursor.cursorType;
      cell.setAttribute('role', 'gridcell');
      cell.setAttribute('aria-label', cursor.label);
      cell.title = cursor.label;

      const image = document.createElement('img');
      image.src = cursor.src;
      image.alt = '';
      cell.appendChild(image);

      cell.addEventListener('click', () => {
        selectedCursorType = cursor.cursorType;
        updateSelectedCell();
        postPluginMessage({
          type: 'create-cursor',
          ...getCurrentSettings()
        });
      });

      return cell;
    }

    function renderCursorGrid(cursors) {
      cursorOptions = cursors;
      cursorGrid.replaceChildren();
      cursorGrid.style.setProperty(
        '--visible-row-count',
        String(Math.max(1, Math.min(Math.ceil(cursorOptions.length / 4), 8)))
      );

      cursorOptions.forEach((cursor) => {
        cursorGrid.appendChild(createCursorCell(cursor));
      });

      updateSelectedCell();
    }

    window.addEventListener('message', (event) => {
      const msg = event.data.pluginMessage;

      if (msg && msg.type === 'cursor-options') {
        renderCursorGrid(msg.cursors);
      }

      if (msg && msg.type === 'update-ui') {
        selectedCursorType = msg.cursorType;
        cursorSizeSelect.value = msg.cursorSize;
        updateSelectedCell();
      }
    });

    postPluginMessage({ type: 'ui-ready' });
  </script>
</body>
</html>
