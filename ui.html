<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), clipboard-write=(), display-capture=()">
  <style>
    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      overflow: hidden;
      box-sizing: border-box;
    }
    
    .controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 200px;
      box-sizing: border-box;
    }
    
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    
    label {
      font-size: 12px;
      font-weight: 500;
      color: #333;
    }
    
    select {
      padding: 8px 24px 8px 8px;
      border: 1px solid #d0d0d0;
      border-radius: 4px;
      background: white;
      font-size: 12px;
    }
    
    select:focus {
      outline: none;
      border-color: #007aff;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 6px;
    }
    
    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    
    .primary {
      background: #007aff;
      color: white;
    }
    
    .primary:hover {
      background: #0056b3;
    }
    
    .secondary {
      background: #e0e0e0;
      color: #333;
    }
    
    .secondary:hover {
      background: #d0d0d0;
    }
  </style>
</head>
<body>
  <div class="controls">
    <div class="control-group">
      <label for="cursorType">Cursor Type</label>
      <select id="cursorType">
        <option value="Windows 98 - pointer">Windows 98 - Pointer</option>
        <option value="Windows 98 - hand">Windows 98 - Hand</option>
        <option value="Windows 98 - loading">Windows 98 - Loading</option>
        <option value="MacOS 9 - pointer">MacOS 9 - Pointer</option>
        <option value="MacOS 9 - hand">MacOS 9 - Hand</option>
        <option value="MacOS 9 - busy">MacOS 9 - Busy</option>
        <option value="MacOS 9 - loading">MacOS 9 - loading</option>
        <option value="Amiga Workbench 1.0 - Normal">Amiga Workbench 1.0 - Normal</option>
        <option value="Amiga Workbench 1.0 - Busy">Amiga Workbench 1.0 - Busy</option>
        <option value="Amiga Workbench 1.0 - Link">Amiga Workbench 1.0 - Link</option>
        <option value="Amiga Workbench 1.0 - Working">Amiga Workbench 1.0 - Working</option>
        <option value="Amiga Workbench 2.0 - Normal">Amiga Workbench 2.0 - Normal</option>
        <option value="Amiga Workbench 2.0 - Busy">Amiga Workbench 2.0 - Busy</option>
        <option value="Amiga Workbench 2.0 - Link">Amiga Workbench 2.0 - Link</option>
        <option value="Amiga Workbench 2.0 - Working">Amiga Workbench 2.0 - Working</option>
      </select>
    </div>
    
    <div class="control-group">
      <label for="cursorSize">Size</label>
      <select id="cursorSize">
        <option value="16 px">16 px</option>
        <option value="24 px" selected>24 px</option>
        <option value="32 px">32 px</option>
        <option value="48 px">48 px</option>
        <option value="64 px">64 px</option>
      </select>
    </div>
    
    <div class="button-group">
      <button id="createCursor" class="primary">Add Cursor</button>
      <button id="updateCursor" class="secondary">Update Selected</button>
    </div>
  </div>
  
  <script>
    const cursorTypeSelect = document.getElementById('cursorType');
    const cursorSizeSelect = document.getElementById('cursorSize');
    const createButton = document.getElementById('createCursor');
    const updateButton = document.getElementById('updateCursor');
    
    function getCurrentSettings() {
      return {
        cursorType: cursorTypeSelect.value,
        cursorSize: cursorSizeSelect.value
      };
    }
    
    createButton.addEventListener('click', () => {
      parent.postMessage({
        pluginMessage: {
          type: 'create-cursor',
          ...getCurrentSettings()
        }
      }, '*');
    });
    
    updateButton.addEventListener('click', () => {
      parent.postMessage({
        pluginMessage: {
          type: 'update-selected',
          ...getCurrentSettings()
        }
      }, '*');
    });
    
    // Listen for messages from the plugin
    window.addEventListener('message', (event) => {
      const msg = event.data.pluginMessage;
      if (msg && msg.type === 'update-ui') {
        cursorTypeSelect.value = msg.cursorType;
        cursorSizeSelect.value = msg.cursorSize;
      }
    });
  </script>
</body>
</html>
